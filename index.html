  <body>
    <div id="root"></div>
    <script>
      // Strip the "This is how." → Agent Business Model CTA → socials block from the bottom of the page.
      // React renders the manifesto into #root; we wait, then walk siblings after the "This is how." section and remove them.
      (function () {
        function strip() {
          var ps = document.querySelectorAll('p');
          for (var i = 0; i < ps.length; i++) {
            if ((ps[i].textContent || '').trim() === 'This is how.') {
              var wrap = ps[i].parentElement; // section container for the heading
              if (!wrap) return true;
              // Remove everything after the heading section within the same content column.
              var sibling = wrap.nextElementSibling;
              while (sibling) {
                var n = sibling.nextElementSibling;
                sibling.parentNode.removeChild(sibling);
                sibling = n;
              }
              // Remove the heading section itself.
              wrap.parentNode.removeChild(wrap);
              // Also nuke any social-icon row that lives outside <main> (footer-style row of svg icons).
              document.querySelectorAll('a[href*="instagram"],a[href*="tiktok"],a[href*="youtube"],a[href*="twitter"],a[href*="x.com"]').forEach(function(a){
                // Only kill social rows that are below the manifesto content (likely in a flex/grid icon group with siblings limited to socials).
                var parent = a.parentElement;
                if (!parent) return;
                var sibs = Array.from(parent.children);
                var allSocial = sibs.every(function(s){ var h = s.getAttribute('href') || ''; return /instagram|tiktok|youtube|twitter|x\.com/.test(h); });
                if (allSocial && sibs.length >= 2) {
                  parent.parentNode && parent.parentNode.removeChild(parent);
                }
              });
              return true;
            }
          }
          return false;
        }
        var tries = 0;
        var t = setInterval(function () {
          if (strip() || ++tries > 30) clearInterval(t);
        }, 200);
        // Also rerun after any late re-renders.
        new MutationObserver(function () { strip(); }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
