<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Agent Esports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-CwJn4zWy.js"></script>

  </head>
  <body>
    <div id="root"></div>
    <style>
      /* Closing line "Agent is building it." gets the headline treatment. */
      .ag-mfst-closer {
        font-size: clamp(40px, 6.4vw, 84px) !important;
        line-height: 0.95 !important;
        letter-spacing: -0.035em !important;
        font-weight: 900 !important;
        margin: 24px 0 0 !important;
        text-wrap: balance;
      }
      /* Kill the trailing white void left over after the bottom block was stripped. */
      #root > div.min-h-screen { min-height: 0 !important; }
      main.flex.flex-col.items-center { padding-bottom: 56px !important; }
      @media (min-width: 768px) {
        main.flex.flex-col.items-center { padding-bottom: 80px !important; }
      }
    </style>
    <script>
      // Strip the closing CTA block from the manifesto: "This is how." heading,
      // the bouncing down arrow, the "Agent Business Model" button, and the footer
      // social-icon row. React renders into #root, so we retry + observe.
      (function () {
        function removeUp(el, levels) {
          for (var i = 0; i < levels && el && el.parentNode; i++) el = el.parentElement;
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }
        function strip() {
          var did = false;
          // 1. "This is how." headline + everything after it inside the same column.
          var ps = document.querySelectorAll('p, h1, h2, h3');
          for (var i = 0; i < ps.length; i++) {
            if ((ps[i].textContent || '').trim() === 'This is how.') {
              var wrap = ps[i].parentElement;
              if (wrap) {
                var sib = wrap.nextElementSibling;
                while (sib) { var n = sib.nextElementSibling; sib.parentNode.removeChild(sib); sib = n; }
                wrap.parentNode.removeChild(wrap);
                did = true;
              }
              break;
            }
          }
          // 2. "Agent Business Model" button — remove the button and its arrow/wrapper.
          var btns = document.querySelectorAll('a, button');
          for (var j = 0; j < btns.length; j++) {
            var t = (btns[j].textContent || '').trim();
            if (t === 'Agent Business Model' || /^Agent\s+Business\s+Model$/i.test(t)) {
              // Walk up 2-3 levels to catch the section wrapper (which usually also holds the arrow).
              var sect = btns[j];
              var hops = 0;
              while (sect && sect.parentElement && hops < 3) {
                var p = sect.parentElement;
                if (p.tagName === 'BODY' || p.id === 'root' || p.tagName === 'MAIN') break;
                sect = p; hops++;
              }
              if (sect && sect.parentNode) sect.parentNode.removeChild(sect);
              did = true;
              break;
            }
          }
          // 3. Bouncing down-arrow that pointed at the button (now orphaned).
          //    Match an element whose only content is the down-arrow glyph ↓.
          document.querySelectorAll('span, div, p').forEach(function (n) {
            if (n.children.length === 0) {
              var txt = (n.textContent || '').trim();
              if (txt === '↓' || txt === '⬇' || txt === '&darr;') {
                n.parentNode && n.parentNode.removeChild(n);
                did = true;
              }
            }
          });
          // 4. Social-icon row in the footer.
          document.querySelectorAll('a[href*="instagram"],a[href*="tiktok"],a[href*="youtube"],a[href*="twitter"],a[href*="x.com"]').forEach(function (a) {
            var parent = a.parentElement;
            if (!parent) return;
            var sibs = Array.from(parent.children);
            var allSocial = sibs.every(function (s) {
              var h = s.getAttribute && s.getAttribute('href') || '';
              return /instagram|tiktok|youtube|twitter|x\.com/.test(h);
            });
            if (allSocial && sibs.length >= 2) {
              parent.parentNode && parent.parentNode.removeChild(parent);
              did = true;
            }
          });
          // 5. Promote "Agent is building it." to the closing-statement size.
          document.querySelectorAll('p, h1, h2, h3').forEach(function (el) {
            if ((el.textContent || '').trim() === 'Agent is building it.' && !el.classList.contains('ag-mfst-closer')) {
              el.classList.add('ag-mfst-closer');
              did = true;
            }
          });
          return did;
        }
        var tries = 0;
        var t = setInterval(function () {
          strip();
          if (++tries > 60) clearInterval(t);
        }, 150);
        new MutationObserver(function () { strip(); }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
